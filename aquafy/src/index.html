<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles/style.css">
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.11.2/jquery.min.js"></script>
    <title>Aquafy</title>
</head>
<body>
    <script>

        const parametros = getHashParams();
        const token = parametros.access_token;

        function getHashParams() {
          var hashParams = {};
          var e, r = /([^&;=]+)=?([^&;]*)/g,
              q = window.location.hash.substring(1);
          while ( e = r.exec(q)) {
             hashParams[e[1]] = decodeURIComponent(e[2]);
          }
          return hashParams;
        }

        getArtists = () =>{
            $.ajax({
            method: "GET",
            dataType: "Json",
            url:"https://api.spotify.com/v1/me/top/artists",
            headers: {
            Authorization: `Bearer ${token}`
            }
            })
            .then(dados => {
            console.log(dados)
            })
        }

        topTracksDuaLipa = () =>{
            $.ajax({
            method: "GET",
            dataType: "Json",
            url:"https://api.spotify.com/v1/artists/6M2wZ9GZgrQXHCFfjv46we/top-tracks?country=BR",
            headers: {
            Authorization: `Bearer ${token}`
            }
            })
            .then(dados => {
            console.log(dados.tracks[0].name)
            })
        }

    </script>
    <main class="container">

        <div class="logo">
            <img src="./images/logo.png" alt="Logo do Aquafy">
        </div>

        <div class="title">
            <p>Selecione o que você deseja usar para gerar sua playlist</p>
        </div>

        <div class="buttons">
            <div class="button">
                <a href="http://localhost:8888">
                    <img src="./images/headphone.png" alt="Ícone de fone de ouvido">
                </a>
                <p>Suas músicas mais escutadas</p>
            </div>

            <div class="button" onclick="getArtists()">
            
                <a href="#">
                    <img src="./images/microphone.png" alt="Ícone de fone de ouvido">
                </a>
           
                <p>Seus artistas mais escutados</p>
            </div>
        </div>
    </main>
</body>
</html>
